name: Hosted API

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - id: probe
        run: npm run check:hosted-api

      - name: Open or update outage issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const label = 'hosted-api-down';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const timestamp = new Date().toISOString();
            const body = [
              `The hourly hosted-API probe failed.`,
              ``,
              `- Run: ${runUrl}`,
              `- Detected at: ${timestamp}`,
              `- Trigger: ${context.eventName}`,
              ``,
              `Triage pointers: see \`apps/api/RUNBOOK.md\` → First Triage.`,
            ].join('\n');

            // Ensure the label exists (create on first use so the workflow is self-contained).
            try {
              await github.rest.issues.getLabel({ ...context.repo, name: label });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  ...context.repo,
                  name: label,
                  color: 'b60205',
                  description: 'Hosted API probe reported an outage',
                });
              } else {
                throw error;
              }
            }

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              ...context.repo,
              state: 'open',
              labels: label,
              per_page: 100,
            });

            if (existing.length > 0) {
              const issue = existing[0];
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body,
              });
              core.info(`Appended failure comment to open outage issue #${issue.number}.`);
            } else {
              const created = await github.rest.issues.create({
                ...context.repo,
                title: 'Hosted API probe failing',
                body,
                labels: [label],
              });
              core.info(`Opened outage issue #${created.data.number}.`);
            }

      - name: Close outage issue on recovery
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            const label = 'hosted-api-down';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const timestamp = new Date().toISOString();

            try {
              await github.rest.issues.getLabel({ ...context.repo, name: label });
            } catch (error) {
              if (error.status === 404) {
                core.info('No hosted-api-down label exists yet; nothing to close.');
                return;
              }
              throw error;
            }

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              ...context.repo,
              state: 'open',
              labels: label,
              per_page: 100,
            });

            if (existing.length === 0) {
              core.info('No open outage issue to close.');
              return;
            }

            for (const issue of existing) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body: `Recovered at ${timestamp}. Probe succeeded in ${runUrl}.`,
              });
              await github.rest.issues.update({
                ...context.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              core.info(`Closed recovered outage issue #${issue.number}.`);
            }
