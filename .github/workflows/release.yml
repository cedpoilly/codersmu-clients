name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_npm:
        description: Publish the root package to npm
        required: false
        default: false
        type: boolean
      package_macos:
        description: Build the signed macOS release artifact
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  publish-npm:
    if: ${{ secrets.NPM_TOKEN != '' && (github.event_name == 'release' || github.event.inputs.publish_npm == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  package-macos:
    runs-on: macos-latest
    if: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 != '' && secrets.MACOS_DEVELOPER_ID_P12_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' && secrets.APP_STORE_CONNECT_KEY_ID != '' && secrets.APP_STORE_CONNECT_KEY_P8_BASE64 != '' && (github.event_name == 'release' || github.event.inputs.package_macos != 'false') }}
    steps:
      - uses: actions/checkout@v6

      - name: Import Developer ID certificate
        env:
          MACOS_DEVELOPER_ID_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          MACOS_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="${RUNNER_TEMP}/developer-id-application.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/codersmu-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "${MACOS_DEVELOPER_ID_P12_BASE64}" | base64 --decode > "${CERTIFICATE_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" -P "${MACOS_DEVELOPER_ID_P12_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security default-keychain -s "${KEYCHAIN_PATH}"

      - name: Write App Store Connect key
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail

          KEY_PATH="${RUNNER_TEMP}/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          echo "${APP_STORE_CONNECT_KEY_P8_BASE64}" | base64 --decode > "${KEY_PATH}"
          chmod 600 "${KEY_PATH}"
          echo "APP_STORE_CONNECT_KEY_PATH=${KEY_PATH}" >> "${GITHUB_ENV}"

      - name: Package signed macOS app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          CODERSMU_MACOS_ARTIFACT_LABEL: ${{ github.event_name == 'release' && github.event.release.tag_name || format('manual-{0}', github.sha) }}
        run: bash apps/macos/scripts/package.sh

      - uses: actions/upload-artifact@v4
        with:
          name: codersmu-macos-package
          path: apps/macos/dist/*.zip

      - name: Upload release assets
        if: ${{ github.event_name == 'release' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" apps/macos/dist/*.zip --clobber
